schema: spec-driven

strict_tdd: true

context: |
  Project: customer-churn-analytics (repo root: personal-portafolio)
  Intended product: Customer Churn Prediction portfolio.
  Detected codebase: active monorepo with a Next.js web app, a FastAPI API package, and a Python ML package.
  Detected stack: TypeScript/React 19/Next.js 15 web app, Python 3.12+ packages, uv-managed Python workspace, pnpm-managed web app, pytest, pytest-cov, ruff, mypy, Vitest, Playwright, ESLint, and TypeScript.
  Architecture intent: Clean/Hexagonal, modular system, English artifacts.
  Persistence mode: openspec.
  Testing: strict TDD requested and active; runners are present in repo config and CI.
  Style: formal design brief first; MLflow and deployment later.

rules:
  proposal:
    - Include rollback plan for risky changes.
  specs:
    - Use Given/When/Then for scenarios.
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY).
  design:
    - Include sequence diagrams for complex flows.
    - Document architecture decisions with rationale.
  tasks:
    - Group by phase and keep tasks completable in one session.

testing:
  runner: mixed
  coverage: pytest-cov
  lint: ruff + eslint
  typecheck: mypy + tsc
  formatter: not explicitly configured
  strict_tdd:
    requested: true
    active: true
    mode: red-green-refactor
    note: Python tests use pytest, web unit tests use Vitest, and web e2e uses Playwright.
  layers:
    unit: true
    integration: true
    e2e: true
  planned_commands:
    ml_unit: pytest packages/ml/tests
    api_unit_integration: pytest apps/api/tests
    web_unit: pnpm --dir apps/web test
    web_typecheck: pnpm --dir apps/web typecheck
    e2e: pnpm --dir apps/web test:e2e
    ci: GitHub Actions workflow pending installation

apply:
  test_command: ""
  tdd: true
  tdd_mode: strict

verify:
  test_command: ""
  build_command: ""
  coverage_threshold: 0

archive:
  - Warn before merging destructive deltas.
